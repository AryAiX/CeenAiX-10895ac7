name: Supabase Migrations

# PR dry-run only. Production apply runs in the Release workflow (deploy.yml)
# via Management API (SUPABASE_ACCESS_TOKEN) — no DB password required.

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'scripts/prod-demo-cleanup.sql'
      - 'scripts/prod-release-verify.sql'
      - '.github/workflows/migrations.yml'
      - '.github/workflows/deploy.yml'

jobs:
  dry-run:
    name: Migration dry-run (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: List pending prod migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
        run: |
          echo "::group::Migrations pending on prod"
          node scripts/push-migrations-management-api.mjs --dry-run || true
          echo "::endgroup::"
