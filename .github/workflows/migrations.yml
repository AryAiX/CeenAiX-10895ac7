name: Supabase Migrations

# Push migrations to the linked prod project automatically when files under
# supabase/migrations/ change on main. Also runs a dry-run on PRs so reviewers
# see which migrations a merge would apply.
#
# Required GitHub secrets (Repository → Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN   : personal access token from
#                                https://supabase.com/dashboard/account/tokens
#   - SUPABASE_PROD_PROJECT_REF : prod project ref (currently ziykaxyadcdmyakzvjff)
#   - SUPABASE_PROD_DB_PASSWORD : prod DB password (rotate via dashboard)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'scripts/prod-demo-cleanup.sql'
      - '.github/workflows/migrations.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

jobs:
  dry-run:
    name: Migration dry-run (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to prod project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_PROD_DB_PASSWORD }}"

      - name: Show pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "::group::Migrations pending on prod"
          supabase migration list --linked || true
          echo "::endgroup::"

  apply:
    name: Apply migrations to prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROD_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to prod project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_PROD_DB_PASSWORD }}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo 'Y' | supabase db push --linked --include-all \
            --password "${{ secrets.SUPABASE_PROD_DB_PASSWORD }}"

      - name: Re-run demo-data cleanup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # Mixed migrations may re-introduce demo rows on first apply; the
        # cleanup is idempotent so re-running is safe and cheap.
        run: |
          supabase db query --linked --file scripts/prod-demo-cleanup.sql --output csv || true

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -d supabase/functions ] && [ "$(ls -A supabase/functions 2>/dev/null)" ]; then
            for fn in supabase/functions/*/; do
              name="$(basename "$fn")"
              echo "Deploying $name…"
              supabase functions deploy "$name" \
                --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}" || true
            done
          else
            echo "No edge functions to deploy."
          fi
