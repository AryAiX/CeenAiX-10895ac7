name: Build

# PR / push: lint, typecheck, vite build.
# Push to main only (after quality passes): dev Supabase + dev.ceenaix.com deploy.
# Production: manual Release workflow (deploy.yml) — never triggered from merge.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  dev-supabase:
    name: Dev Supabase
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Sync dev Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DEV_PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
          SUPABASE_DEV_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
          SUPABASE_RESEND_SMTP_PASSWORD: ${{ secrets.SUPABASE_RESEND_SMTP_PASSWORD }}
        run: bash scripts/dev-release-supabase.sh

  dev-deploy:
    name: Dev Deploy (dev.ceenaix.com)
    needs: dev-supabase
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pull Vercel preview environment
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 pull --yes --environment=preview --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview artifacts (dev Supabase)
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 build --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to dev.ceenaix.com
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          DEPLOY_URL="$(npx vercel@50.1.3 deploy --prebuilt --token "$VERCEL_TOKEN_CLEAN")"
          echo "Deployment URL: ${DEPLOY_URL}"
          npx vercel@50.1.3 alias set "${DEPLOY_URL}" dev.ceenaix.com --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
