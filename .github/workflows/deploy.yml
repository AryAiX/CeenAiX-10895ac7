name: Release

# Full production release on every main merge (and manual dispatch):
# 1. Supabase — migrations, demo cleanup, reference-data verify, edge functions, auth platform
# 2. Vercel — production frontend build + deploy
#
# Required GitHub secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROD_PROJECT_REF,
# SUPABASE_PROD_DB_PASSWORD, VERCEL_* , VITE_SUPABASE_PROD_* .
# Optional: SUPABASE_RESEND_SMTP_PASSWORD (applies Resend SMTP via Management API).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  supabase:
    name: Production Supabase
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: production
      # Static URL — GitHub does not allow secrets in environment.url
      url: https://supabase.com/dashboard/project/ziykaxyadcdmyakzvjff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Sync Supabase production (schema, ref data, functions, auth)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          SUPABASE_PROD_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          SUPABASE_RESEND_SMTP_PASSWORD: ${{ secrets.SUPABASE_RESEND_SMTP_PASSWORD }}
        run: bash scripts/prod-release-supabase.sh

  deploy:
    name: Production Deploy
    needs: supabase
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pull Vercel Environment Information
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          echo "Decoded Vercel token length: ${#VERCEL_TOKEN_CLEAN}"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 pull --yes --environment=production --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 build --prod --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_PROD_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PROD_ANON_KEY }}
          VITE_PREVIEW_PIN_GATE: "false"

      - name: Deploy to Vercel
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 deploy --prebuilt --prod --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
