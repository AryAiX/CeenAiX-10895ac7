name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Normalize Vercel Token
        run: echo "VERCEL_TOKEN_CLEAN=$(printf '%s' "$VERCEL_TOKEN_B64" | base64 -d | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}

      - name: Pull Vercel Environment Information
        run: npx vercel@50.1.3 pull --yes --environment=production --token="$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: npx vercel@50.1.3 build --prod --token="$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        run: npx vercel@50.1.3 deploy --prebuilt --prod --token="$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Normalize Vercel Token
        run: echo "VERCEL_TOKEN_CLEAN=$(printf '%s' "$VERCEL_TOKEN_B64" | base64 -d | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}

      - name: Pull Vercel Environment Information
        run: npx vercel@50.1.3 pull --yes --environment=preview --token="$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: npx vercel@50.1.3 build --token="$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy Preview to Vercel
        run: npx vercel@50.1.3 deploy --prebuilt --token="$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
